<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 에이전트 용어 사전</title>
<style>
  :root {
    --bg: #f7f6f3;
    --bg2: #ffffff;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text2: #5a5a56;
    --text3: #9a9a94;
    --radius: 12px;
    --tag-arch-bg: #EEEDFE; --tag-arch-tx: #3C3489;
    --tag-tool-bg: #E1F5EE; --tag-tool-tx: #085041;
    --tag-env-bg:  #FAEEDA; --tag-env-tx:  #633806;
    --tag-agent-bg:#FAECE7; --tag-agent-tx:#4A1B0C;
    --accent: #534AB7;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #181816; --bg2: #222220; --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --text: #e8e6de; --text2: #a0a09a; --text3: #606059;
      --tag-arch-bg:#26215C; --tag-arch-tx:#CECBF6;
      --tag-tool-bg:#04342C; --tag-tool-tx:#9FE1CB;
      --tag-env-bg: #412402; --tag-env-tx: #FAC775;
      --tag-agent-bg:#4A1B0C; --tag-agent-tx:#F5C4B3;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    padding: 40px 40px 24px;
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 24px; font-weight: 500; margin-bottom: 4px; }
  header p  { font-size: 15px; color: var(--text2); }
  .layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    height: calc(100vh - 97px);
  }
  .sidebar {
    overflow-y: auto;
    border-right: 1px solid var(--border);
    padding: 20px 16px;
  }
  .search-input {
    width: 100%; padding: 8px 12px;
    border: 1px solid var(--border2); border-radius: var(--radius);
    background: var(--bg2); color: var(--text);
    font-size: 15px; outline: none; margin-bottom: 8px;
    transition: border-color .15s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text3); }
  .no-results { font-size: 13px; color: var(--text3); padding: 12px 8px; }
  .section-label {
    font-size: 12px; font-weight: 500; color: var(--text3);
    letter-spacing: .1em; text-transform: uppercase;
    padding: 14px 8px 6px;
  }
  .section-label:first-child { padding-top: 4px; }
  .card {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 11px 12px; border-radius: var(--radius);
    cursor: pointer; border: 1px solid transparent;
    transition: background .12s, border-color .12s;
    margin-bottom: 4px;
  }
  .card:hover { background: var(--bg2); border-color: var(--border); }
  .card.active {
    background: var(--bg2);
    border-color: var(--border2);
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  .tag {
    font-size: 12px; font-weight: 500;
    padding: 2px 7px; border-radius: 20px;
    white-space: nowrap; flex-shrink: 0; margin-top: 1px;
  }
  .tag-arch  { background: var(--tag-arch-bg);  color: var(--tag-arch-tx); }
  .tag-tool  { background: var(--tag-tool-bg);  color: var(--tag-tool-tx); }
  .tag-env   { background: var(--tag-env-bg);   color: var(--tag-env-tx); }
  .tag-agent { background: var(--tag-agent-bg); color: var(--tag-agent-tx); }
  .card-text { min-width: 0; }
  .card-title { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
  .card-short { font-size: 13px; color: var(--text3); }
  .detail-pane {
    overflow-y: auto;
    padding: 40px 48px;
    display: flex; flex-direction: column; justify-content: flex-start;
  }
  .empty-state {
    margin: auto;
    text-align: center;
    color: var(--text3);
    font-size: 15px;
    line-height: 2;
  }
  .empty-state .big { font-size: 34px; margin-bottom: 8px; opacity: .3; }
  .detail-tag { margin-bottom: 14px; display: inline-block; }
  .detail-title-row { margin-bottom: 20px; }
  .detail-title { font-size: 28px; font-weight: 500; color: var(--text); line-height: 1.2; }
  .detail-subtitle { font-size: 16px; color: var(--text2); margin-top: 4px; }
  .detail-section-label {
    font-size: 12px; font-weight: 500; color: var(--text3);
    letter-spacing: .08em; text-transform: uppercase;
    margin-bottom: 8px; margin-top: 24px;
  }
  .detail-section-label:first-of-type { margin-top: 0; }
  .detail-body {
    font-size: 17px; color: var(--text2); line-height: 1.8;
    border-left: 2px solid var(--border2);
    padding-left: 16px;
  }
  .detail-example {
    font-size: 15px; color: var(--text3); line-height: 1.7;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
  }
  .detail-related {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px;
  }
  .related-pill {
    font-size: 13px; padding: 3px 10px;
    border: 1px solid var(--border2); border-radius: 20px;
    color: var(--text2); cursor: pointer;
    transition: background .1s, color .1s;
  }
  .related-pill:hover { background: var(--bg2); color: var(--text); }
  .divider { border: none; border-top: 1px solid var(--border); margin: 28px 0; }
  @media (max-width: 680px) {
    .layout { grid-template-columns: 1fr; height: auto; }
    .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
    .detail-pane { padding: 24px 20px; }
  }
</style>
</head>
<body>
<header>
  <h1>AI 에이전트 용어 사전</h1>
  <p>클릭하면 오른쪽에 상세 설명이 나타납니다 · 총 18개 용어</p>
</header>
<div class="layout">
  <nav class="sidebar" id="sidebar">
    <input class="search-input" id="search" type="text" placeholder="용어 검색...">
  </nav>
  <main class="detail-pane" id="detail">
    <div class="empty-state">
      <div class="big">◎</div>
      왼쪽 카드를 클릭하세요
    </div>
  </main>
</div>

];

const catOrder = ["env","func","agent"];
const catLabel = { env:"인프라 / 환경", func:"기능 / 확장", agent:"에이전트 구조" };
const sidebar = document.getElementById("sidebar");
const detail  = document.getElementById("detail");

catOrder.forEach(cat => {
  const lbl = document.createElement("div");
  lbl.className = "section-label";
  lbl.textContent = catLabel[cat];
  sidebar.appendChild(lbl);

  terms.filter(t=>t.cat===cat).forEach(t => {
    const card = document.createElement("div");
    card.className = "card";
    card.dataset.id = t.id;
    card.innerHTML = `<span class="tag ${t.tagClass}">${t.tag}</span>
      <div class="card-text">
        <div class="card-title">${t.title}</div>
        <div class="card-short">${t.short}</div>
      </div>`;
    card.addEventListener("click", () => showDetail(t));
    sidebar.appendChild(card);
  });
});

function showDetail(t) {
  document.querySelectorAll(".card").forEach(c => c.classList.remove("active"));
  document.querySelector(`.card[data-id="${t.id}"]`).classList.add("active");

  const related = (t.related||[]).map(id => {
    const r = terms.find(x=>x.id===id);
    return r ? `<span class="related-pill" onclick="openById('${r.id}')">${r.title}</span>` : "";
  }).join("");

  detail.innerHTML = `
    <span class="tag detail-tag ${t.tagClass}">${t.tag}</span>
    <div class="detail-title-row">
      <div class="detail-title">${t.title}</div>
      <div class="detail-subtitle">${t.short}</div>
    </div>
    <div class="detail-section-label">개념 설명</div>
    <div class="detail-body">${t.detail}</div>
    <div class="detail-section-label" style="margin-top:20px">실제 예시</div>
    <div class="detail-example">${t.example}</div>
    ${related ? `<hr class="divider"><div class="detail-section-label">관련 용어</div><div class="detail-related">${related}</div>` : ""}
  `;
  detail.scrollTop = 0;
}

window.openById = function(id) {
  const t = terms.find(x=>x.id===id);
  if (t) showDetail(t);
};

document.getElementById("search").addEventListener("input", function() {
  const q = this.value.trim().toLowerCase();
  const cards = sidebar.querySelectorAll(".card");
  const labels = sidebar.querySelectorAll(".section-label");
  let noResults = sidebar.querySelector(".no-results");

  if (!q) {
    cards.forEach(c => c.style.display = "");
    labels.forEach(l => l.style.display = "");
    if (noResults) noResults.remove();
    return;
  }

  labels.forEach(l => l.style.display = "none");
  let count = 0;
  cards.forEach(c => {
    const t = terms.find(x => x.id === c.dataset.id);
    const match = t && (
      t.title.toLowerCase().includes(q) ||
      t.short.toLowerCase().includes(q) ||
      t.detail.toLowerCase().includes(q)
    );
    c.style.display = match ? "" : "none";
    if (match) count++;
  });

  if (!noResults) {
    noResults = document.createElement("div");
    noResults.className = "no-results";
    sidebar.appendChild(noResults);
  }
  noResults.textContent = count === 0 ? "검색 결과 없음" : "";
  noResults.style.display = count === 0 ? "" : "none";
});
</script>
</body>
</html>
